<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="master.css">
  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <main class="page">
    <article class="card">
      <a class="card-image-link" href="#" aria-label="View Equilibrium #3429 NFT">
        <img class="card-image" src="./images/image-equilibrium.jpg" alt="Equilibrium art cube">
        <span class="card-image-overlay" aria-hidden="true">
          <img src="./images/icon-view.svg" alt="">
        </span>
      </a>

      <h1 class="card-title"><a href="#">Equilibrium #3429</a></h1>
      <p class="card-description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="card-meta">
        <p class="price"><img src="./images/icon-ethereum.svg" alt="">0.041 ETH</p>
        <p class="time-left"><img src="./images/icon-clock.svg" alt="">3 days left</p>
      </div>

      <p class="creator">
        <img src="./images/image-avatar.png" alt="Jules Wyvern avatar">
        Creation of <a href="#">Jules Wyvern</a>
      </p>
    </article>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Zakaria Seddik</a>.
  </div>
</body>
</html>
